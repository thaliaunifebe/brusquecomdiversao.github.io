<body>
    <div class="container-principal">
        <div class="balao-topo-titulo">
            <img src="images/nuvem-fundo.png" alt="Balão" class="img-balao">
            <h2>Brusque com Diversão</h2>
        </div>
        <div class="dados-aluno">
            <form action="pergunta1.html">
            <label for="nome">Seu nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Escreva seu nome aqui!" required>
            <label for="idade">Sua idade:</label>
            <input type="number" id="idade" name="idade" max="8" min="2" placeholder="Escreva sua idade aqui!" required>
            <label for="escola">Sua escola:</label>
            <input type="text" id="escola" name="escola" placeholder="Escreva o nome da escola aqui!" required>
            <button class="botao-estilizacao" type="submit">COMEÇAR</button>
            </form>
        </div>
    </div>
